name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: go test -tags=integration ./internal/store/...
