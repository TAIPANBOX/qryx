<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="560" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="560" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="538" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/qryx</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Drift detection in CI</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Snapshot the asset graph, then fail the build when a new weak or quantum-vulnerable asset appears.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><rect x="40" y="170" width="360" height="170" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><text x="62" y="204" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">1 · BASELINE</text><rect x="62" y="220" width="316" height="40" rx="8" ry="8" fill="#0b0f16" stroke="#222b38" stroke-width="1"/><text x="74" y="245" font-size="13" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">$ qryx scan --save base.json &lt;path&gt;</text><text x="62" y="290" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Snapshot the full cryptographic</text><text x="62" y="310" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">asset graph (JSON or Postgres).</text><line x1="414" y1="270" x2="507" y2="270" stroke="#69788b" stroke-width="2.2"/><path d="M 514 270 l -9 -5 l 0 10 z" fill="#69788b"/><text x="460.0" y="256" font-size="12" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="middle">later</text><text x="460.0" y="242" font-size="12" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="middle">commit</text><circle cx="442.0" cy="306" r="4" fill="#2dd4bf"/><circle cx="478.0" cy="306" r="4" fill="#4493f8"/><line x1="442.0" y1="306" x2="478.0" y2="306" stroke="#283341" stroke-width="2"/><rect x="534" y="170" width="360" height="170" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><text x="556" y="204" font-size="12" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">2 · NEW SCAN → DIFF</text><rect x="556" y="220" width="316" height="40" rx="8" ry="8" fill="#0b0f16" stroke="#222b38" stroke-width="1"/><text x="568" y="245" font-size="13" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">$ qryx scan --baseline base.json</text><text x="556" y="290" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Compares against baseline →</text><text x="556" y="310" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">drift = assets added or removed.</text><line x1="904" y1="270" x2="918" y2="270" stroke="#69788b" stroke-width="2"/><rect x="958" y="150" width="282" height="150" rx="14" ry="14" fill="#1b2331" stroke="#3fb950" stroke-width="1.4" filter="soft"/><rect x="958" y="150" width="6" height="150" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><text x="982" y="188" font-size="18" fill="#3fb950" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">✓  CI passes</text><text x="982" y="216" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">No new asset at or above the</text><text x="982" y="236" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">configured severity threshold.</text><text x="982" y="268" font-size="12" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">merge allowed</text><rect x="958" y="322" width="282" height="150" rx="14" ry="14" fill="#1b2331" stroke="#ff6b63" stroke-width="1.4" filter="soft"/><rect x="958" y="322" width="6" height="150" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="982" y="360" font-size="18" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">✕  Build blocked</text><rect x="982" y="376" width="234" height="34" rx="8" ry="8" fill="#0b0f16" stroke="#222b38" stroke-width="1"/><text x="994" y="398" font-size="12.5" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">--fail-on-new high  →  exit 2</text><text x="982" y="430" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">new high-risk or quantum-</text><text x="982" y="448" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">vulnerable asset introduced</text><path d="M 918 270 C 940 270, 940 225.0, 952 225.0" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="0.6"/><path d="M 958 225.0 l -9 -5 l 0 10 z" fill="#3fb950"/><path d="M 918 270 C 940 270, 940 397.0, 952 397.0" fill="none" stroke="#ff6b63" stroke-width="1.8" opacity="0.6"/><path d="M 958 397.0 l -9 -5 l 0 10 z" fill="#ff6b63"/></svg>