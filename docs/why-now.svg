<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="540" viewBox="0 0 1280 540" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="540" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="540" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="518" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/qryx</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Why now</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Post-quantum standards are set and the deadlines are fixed — discovery is the first step.</text><rect x="40" y="116" width="1200" height="78" rx="14" ry="14" fill="#241317" stroke="#ff6b63" stroke-width="1.3"/><rect x="40" y="116" width="6" height="78" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="66" y="150" font-size="19" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">“Harvest now, decrypt later”</text><text x="66" y="176" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Data encrypted with quantum-vulnerable crypto can be captured today and decrypted once a quantum computer exists.</text><line x1="90" y1="330" x2="1190" y2="330" stroke="#283341" stroke-width="2"/><path d="M 1190 330 l -11 -6 l 0 12 z" fill="#283341"/><circle cx="134.0" cy="330" r="7" fill="#0d1117" stroke="#2dd4bf" stroke-width="3"/><circle cx="134.0" cy="330" r="2.5" fill="#2dd4bf"/><line x1="134.0" y1="321" x2="134.0" y2="308" stroke="#2dd4bf" stroke-width="1.4" opacity="0.6"/><rect x="40" y="224" width="224" height="84" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="40" y="224" width="5" height="84" rx="2" ry="2" fill="#2dd4bf" stroke="#283341" stroke-width="1"/><text x="58" y="254" font-size="18" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">2024</text><text x="112" y="254" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">NIST standardizes PQC</text><text x="58" y="280" font-size="12.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">FIPS 203 / 204 / 205</text><circle cx="486.0" cy="330" r="7" fill="#0d1117" stroke="#e3b341" stroke-width="3"/><circle cx="486.0" cy="330" r="2.5" fill="#e3b341"/><line x1="486.0" y1="339" x2="486.0" y2="352" stroke="#e3b341" stroke-width="1.4" opacity="0.6"/><rect x="374.0" y="352" width="224" height="84" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="374.0" y="352" width="5" height="84" rx="2" ry="2" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="392.0" y="382" font-size="18" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">2027</text><text x="446.0" y="382" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">CNSA 2.0</text><text x="392.0" y="408" font-size="12.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">new systems must use PQC</text><circle cx="772.0" cy="330" r="7" fill="#0d1117" stroke="#e3b341" stroke-width="3"/><circle cx="772.0" cy="330" r="2.5" fill="#e3b341"/><line x1="772.0" y1="321" x2="772.0" y2="308" stroke="#e3b341" stroke-width="1.4" opacity="0.6"/><rect x="660.0" y="224" width="224" height="84" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="660.0" y="224" width="5" height="84" rx="2" ry="2" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="678.0" y="254" font-size="18" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">2030</text><text x="732.0" y="254" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">Legacy systems</text><text x="678.0" y="280" font-size="12.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">migration required</text><circle cx="1102.0" cy="330" r="7" fill="#0d1117" stroke="#ff6b63" stroke-width="3"/><circle cx="1102.0" cy="330" r="2.5" fill="#ff6b63"/><line x1="1102.0" y1="339" x2="1102.0" y2="352" stroke="#ff6b63" stroke-width="1.4" opacity="0.6"/><rect x="990.0" y="352" width="224" height="84" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="990.0" y="352" width="5" height="84" rx="2" ry="2" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="1008.0" y="382" font-size="18" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">2035</text><text x="1062.0" y="382" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="start">Full migration</text><text x="1008.0" y="408" font-size="12.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">complete</text><rect x="40" y="446" width="1200" height="60" rx="14" ry="14" fill="#1a212c" stroke="#2dd4bf" stroke-width="1.2"/><circle cx="74" cy="476" r="6" fill="#2dd4bf"/><text x="96" y="473" font-size="15.5" fill="#2dd4bf" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Discovery first.</text><text x="234" y="473" font-size="13.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Organizations consistently find 3–5× more cryptographic assets than expected — you can&#x27;t migrate what you can&#x27;t see.</text><text x="96" y="493" font-size="12.5" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">qryx scans code, binaries, TLS, certs, images, dependencies and cloud KMS into one inventory.</text></svg>